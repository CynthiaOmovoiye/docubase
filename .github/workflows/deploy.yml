name: Deploy docbase

# Triggers:
#   - Push to main → deploys to dev automatically
#   - Manual trigger → choose environment (dev / test / prod)
#
# What this deploys on every push:
#   0. Quality gates   — pytest (unit tests) + Ruff (linting) MUST pass before any deploy
#   1. Infrastructure  — Terraform (EC2, S3, CloudFront, IAM, CloudWatch)
#   2. Frontend        — Vite build → S3 → CloudFront cache invalidation
#   3. Backend+Worker  — git pull + docker compose up --build via SSM RunCommand
#
# Required GitHub Secrets (repo Settings → Secrets and variables → Actions → Secrets):
#   AWS_ROLE_ARN       — ARN of the OIDC IAM role GitHub Actions assumes
#   DEFAULT_AWS_REGION — e.g. us-east-1
#
# Required GitHub Actions Variables (Settings → Secrets and variables → Actions → Variables):
#   DOCBASE_VITE_API_URL       — CloudFront URL baked into the frontend build
#                                e.g. https://d123abc.cloudfront.net
#   DOCBASE_BACKEND_ORIGIN_URL — EC2 public DNS hostname (NOT the IP — CloudFront
#                                requires a hostname). Read from Terraform output
#                                `ec2_public_dns` after the first apply, e.g.
#                                ec2-44-218-139-23.compute-1.amazonaws.com
#
# The AWS OIDC role needs these permissions IN ADDITION to the Terraform permissions:
#   ssm:SendCommand
#   ssm:GetCommandInvocation
#   ssm:ListCommandInvocations
#   ssm:DescribeInstanceInformation
#   ec2:DescribeInstances
#
# First deploy (one-time setup — do this once after workflow first runs):
#   1. Check the Terraform job summary for ec2_public_dns
#   2. Set that value as the DOCBASE_BACKEND_ORIGIN_URL Actions variable
#   3. In AWS Console → SSM → Parameter Store, populate two SecureString params:
#        /docbase/dev/github-deploy-token  — fine-grained GitHub PAT (Contents: Read)
#        /docbase/dev/app-env              — paste the full contents of your .env file
#   4. Push any commit — EC2 bootstraps itself via user_data, then CI takes over

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  # ─── Job 0: Quality gates ───────────────────────────────────────────────────
  # Runs BEFORE any cloud job. A failing test or lint error blocks the deploy.
  # Uses no AWS credentials — pure Python + Node environment only.
  quality:
    name: "Quality gates"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Backend: pytest + Ruff ──────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: backend
        run: ruff check app tests

      - name: pytest (unit)
        working-directory: backend
        run: pytest tests/unit/ -q --tb=short

      # ── Frontend: TypeScript type-check ────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

  # ─── Job 1: Infrastructure ──────────────────────────────────────────────────
  terraform:
    name: "Terraform (${{ github.event.inputs.environment || 'dev' }})"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    needs: quality

    outputs:
      ec2_instance_id: ${{ steps.outputs.outputs.ec2_instance_id }}
      ec2_public_dns:  ${{ steps.outputs.outputs.ec2_public_dns }}
      cloudfront_url:  ${{ steps.outputs.outputs.cloudfront_url }}
      s3_bucket:       ${{ steps.outputs.outputs.s3_bucket }}
      cf_dist_id:      ${{ steps.outputs.outputs.cf_dist_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: docbase-terraform-${{ env.ENVIRONMENT }}
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          AWS_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          terraform init -input=false \
            -backend-config="bucket=docbase-terraform-state-${AWS_ACCOUNT}" \
            -backend-config="key=${{ env.ENVIRONMENT }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.DEFAULT_AWS_REGION }}" \
            -backend-config="dynamodb_table=docbase-terraform-locks" \
            -backend-config="encrypt=true"

      - name: Terraform workspace
        working-directory: terraform
        run: |
          terraform workspace select ${{ env.ENVIRONMENT }} \
            || terraform workspace new ${{ env.ENVIRONMENT }}

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=docbase" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="backend_origin_url=${{ vars.DOCBASE_BACKEND_ORIGIN_URL }}"

      - name: Capture outputs
        id: outputs
        working-directory: terraform
        run: |
          echo "ec2_instance_id=$(terraform output -raw ec2_instance_id)"        >> "$GITHUB_OUTPUT"
          echo "ec2_public_dns=$(terraform output -raw ec2_public_dns)"          >> "$GITHUB_OUTPUT"
          echo "cloudfront_url=$(terraform output -raw cloudfront_url)"          >> "$GITHUB_OUTPUT"
          echo "s3_bucket=$(terraform output -raw s3_frontend_bucket)"           >> "$GITHUB_OUTPUT"
          echo "cf_dist_id=$(terraform output -raw cloudfront_distribution_id)"  >> "$GITHUB_OUTPUT"

      - name: Terraform summary
        working-directory: terraform
        run: |
          EC2_DNS=$(terraform output -raw ec2_public_dns)
          CF_URL=$(terraform output -raw cloudfront_url)
          EC2_ID=$(terraform output -raw ec2_instance_id)

          echo "### Infrastructure" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CloudFront | $CF_URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| EC2 DNS    | \`$EC2_DNS\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| EC2 ID     | \`$EC2_ID\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **First deploy?** Set \`DOCBASE_BACKEND_ORIGIN_URL\` Actions variable" \
               "to \`$EC2_DNS\` (the DNS hostname above — CloudFront requires a hostname," \
               "not an IP). Then re-run the workflow." >> "$GITHUB_STEP_SUMMARY"

  # ─── Job 2: Frontend ────────────────────────────────────────────────────────
  frontend:
    name: "Frontend (${{ github.event.inputs.environment || 'dev' }})"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: docbase-frontend-${{ env.ENVIRONMENT }}
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        working-directory: frontend
        run: |
          if [ -n "${{ vars.DOCBASE_VITE_API_URL }}" ]; then
            echo "VITE_API_URL=${{ vars.DOCBASE_VITE_API_URL }}" > .env.production
          else
            echo "DOCBASE_VITE_API_URL not set — build uses relative /api path (same-origin)"
          fi
          npm ci
          npm run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist "s3://${{ needs.terraform.outputs.s3_bucket }}/" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.terraform.outputs.cf_dist_id }}" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text

      - name: Frontend summary
        run: |
          echo "### Frontend" >> "$GITHUB_STEP_SUMMARY"
          echo "Deployed to: ${{ needs.terraform.outputs.cloudfront_url }}" >> "$GITHUB_STEP_SUMMARY"

  # ─── Job 3: Backend ─────────────────────────────────────────────────────────
  # Uses SSM RunCommand — no SSH key or open port 22 needed.
  # Flow:
  #   1. Fetch GitHub deploy token from SSM (instance role has read access)
  #   2. git fetch + reset to latest main
  #   3. Run scripts/deploy-backend.sh (lives in the repo, versioned alongside the app)
  #      which fetches .env from SSM and runs docker compose up --build
  backend:
    name: "Backend (${{ github.event.inputs.environment || 'dev' }})"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    needs: terraform

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: docbase-backend-${{ env.ENVIRONMENT }}
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Wait for SSM agent to be online
        env:
          INSTANCE_ID: ${{ needs.terraform.outputs.ec2_instance_id }}
          REGION: ${{ secrets.DEFAULT_AWS_REGION }}
        run: |
          echo "Waiting for SSM agent on $INSTANCE_ID (up to 5 min)..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text \
              --region "$REGION" 2>/dev/null || echo "None")
            echo "  [$i/30] SSM status: $STATUS"
            [ "$STATUS" = "Online" ] && { echo "SSM agent is online."; break; }
            [ "$i" -eq 30 ] && { echo "ERROR: SSM agent never came online."; exit 1; }
            sleep 10
          done

      - name: Send deploy command
        id: deploy
        env:
          INSTANCE_ID: ${{ needs.terraform.outputs.ec2_instance_id }}
          REGION: ${{ secrets.DEFAULT_AWS_REGION }}
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          COMMIT_SHA: ${{ github.sha }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # Write the script to a temp file on the Actions runner.
          # jq then encodes it as a single JSON string for --parameters.
          # This avoids all JSON/shell escaping complexity in the YAML,
          # and also fixes "fatal: $HOME not set" — SSM RunCommand runs
          # as root with no login shell; we set HOME explicitly so git
          # and other tools that need a home directory work correctly.
          # We also fetch using the token directly in the URL so we never
          # need `git config --global` (which would write to $HOME/.gitconfig).

          cat > /tmp/ssm-deploy.sh << DEPLOY
          #!/bin/bash
          set -euo pipefail
          export HOME=/home/ec2-user
          exec > >(tee -a /var/log/docbase-deploy.log) 2>&1

          echo "[deploy] commit=${COMMIT_SHA} started=\$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          TOKEN=\$(aws ssm get-parameter \
            --name "/docbase/${ENVIRONMENT}/github-deploy-token" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
            --region "${REGION}")

          # -c safe.directory bypasses the ownership check for this command only.
          # Needed because SSM runs as root but the repo is owned by ec2-user.
          REPO=/home/ec2-user/docubase
          GIT="git -C \$REPO -c safe.directory=\$REPO"

          # Update the origin remote to include the token so `git reset --hard origin/main`
          # works reliably and the local tracking branch stays in sync.
          # We restore the plain URL after the fetch so the token is never stored long-term.
          AUTHED_URL="https://x-access-token:\${TOKEN}@github.com/${GITHUB_REPO}.git"
          PLAIN_URL="https://github.com/${GITHUB_REPO}.git"

          \$GIT remote set-url origin "\${AUTHED_URL}"
          \$GIT fetch origin main
          \$GIT reset --hard origin/main
          \$GIT remote set-url origin "\${PLAIN_URL}"

          echo "[deploy] code at \$(\$GIT log -1 --format='%h %s')"

          bash /home/ec2-user/docubase/scripts/deploy-backend.sh "${ENVIRONMENT}" "${REGION}"
          DEPLOY

          # Encode the script as a single JSON string and send it to SSM.
          # Using one script string (not an array) means SSM passes it to bash
          # as a complete script — no inter-line variable scoping issues.
          PARAMS=$(jq -Rsc '{"commands": [.]}' /tmp/ssm-deploy.sh)

          COMMAND_ID=$(aws ssm send-command \
            --region "$REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "docbase deploy ${COMMIT_SHA:0:7}" \
            --timeout-seconds 600 \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "SSM command sent: $COMMAND_ID"

      - name: Wait for deploy to finish
        env:
          COMMAND_ID: ${{ steps.deploy.outputs.command_id }}
          INSTANCE_ID: ${{ needs.terraform.outputs.ec2_instance_id }}
          REGION: ${{ secrets.DEFAULT_AWS_REGION }}
        run: |
          echo "Polling SSM command $COMMAND_ID (up to 10 min)..."
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$REGION" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "  [$i/60] status: $STATUS"
            case "$STATUS" in
              Success)
                echo "Backend deploy succeeded."
                break
                ;;
              Failed|Cancelled|TimedOut|DeliveryTimedOut|ExecutionTimedOut)
                echo "ERROR: Deploy failed with status: $STATUS"
                echo "--- stdout ---"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
                  --region "$REGION" --query "StandardOutputContent" --output text || true
                echo "--- stderr ---"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
                  --region "$REGION" --query "StandardErrorContent" --output text || true
                exit 1
                ;;
              *)
                sleep 10
                ;;
            esac
            [ "$i" -eq 60 ] && { echo "ERROR: Timed out waiting for deploy."; exit 1; }
          done

      - name: Print deploy log
        if: always()
        env:
          COMMAND_ID: ${{ steps.deploy.outputs.command_id }}
          INSTANCE_ID: ${{ needs.terraform.outputs.ec2_instance_id }}
          REGION: ${{ secrets.DEFAULT_AWS_REGION }}
        run: |
          echo "=== SSM command output ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardOutputContent" \
            --output text || echo "(no output available)"

      - name: Backend summary
        if: success()
        run: |
          echo "### Backend" >> "$GITHUB_STEP_SUMMARY"
          echo "Deployed \`${COMMIT_SHA:0:7}\` to \`${{ needs.terraform.outputs.ec2_instance_id }}\`" >> "$GITHUB_STEP_SUMMARY"
        env:
          COMMIT_SHA: ${{ github.sha }}

  # ─── Summary ────────────────────────────────────────────────────────────────
  summary:
    name: "Summary"
    runs-on: ubuntu-latest
    needs: [terraform, frontend, backend]
    if: always()

    steps:
      - name: Deployment result
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║         docbase deploy complete          ║"
          echo "╠══════════════════════════════════════════╣"
          echo "  Environment : ${{ env.ENVIRONMENT }}"
          echo "  Commit      : ${{ github.sha }}"
          echo "  CloudFront  : ${{ needs.terraform.outputs.cloudfront_url }}"
          echo "  EC2 DNS     : ${{ needs.terraform.outputs.ec2_public_dns }}"
          echo "╠══════════════════════════════════════════╣"
          echo "  Terraform   : ${{ needs.terraform.result }}"
          echo "  Frontend    : ${{ needs.frontend.result }}"
          echo "  Backend     : ${{ needs.backend.result }}"
          echo "╚══════════════════════════════════════════╝"
